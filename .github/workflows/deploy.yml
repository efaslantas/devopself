name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build

      - name: Fix _next directory for LiteSpeed
        run: |
          cd out
          mv _next assets
          find . -name '*.html' -exec sed -i 's|/_next/|/assets/|g' {} +
          find . -name '*.js' -exec sed -i 's|/_next/|/assets/|g' {} +
          echo "Renamed _next to assets"

      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          server-dir: /
          local-dir: ./out/
          dangerous-clean-slate: true
